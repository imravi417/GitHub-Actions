name: portfolio

on:
    push:
        branches: [main]
    

jobs: 
    deploy:
        runs-on: ubuntu:latest
        environment:
          name: github-pages
          url: ${{ steps.deployment.outputs.page_url }} # This makes the URL available in the environment context
        steps:

            #clone the code from present workflow directory
            - name: checkout code
              uses: action/checkout@v4

            #setup github pages
            - name: setup github pages
              uses: action/configure-pages@v4
              
              #static code artifact
            - name: upload static files
              uses: action/upload-pages-artifact@v4
              
              # github page live
            - name: deploy the GitHub page
              uses: action/deploy-pages@v4  
