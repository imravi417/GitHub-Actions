name: CICD
on:
   workflow_dispatch:
      inputs:
         environment:
            description: Select required environment from drop down
            default: dev
            required: true
            type: choice
            options:
               - dev
               - iat
               - sanity
               - uat
      
   
jobs:
   code:
      runs-on: ubuntu-latest
      steps:
        - name: checkout code
          run: echo "git clone"
   build:
      runs-on: ubuntu-latest
      steps:
        - name: build container
          run: echo "docker build"
   test:
      runs-on: ubuntu-latest
      steps:
        - name: run container
          run: echo "docker run"
   deploy:
      if: inputs.environment == 'dev'
      runs-on: ubuntu-latest
      steps:
        - name: deploy the app
          run: echo "docker compose up"
